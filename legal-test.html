<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;background:#1a1714;color:#e8e0d4;font-family:sans-serif;}
.auth-screen{position:fixed;inset:0;background:#1a1714;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 28px;z-index:500;overflow-y:auto;}
.legal-check-wrap{display:flex;align-items:flex-start;gap:10px;margin-top:14px;}
.legal-check-label{font-size:13px;color:#888;line-height:1.6;}
.legal-check-label a{color:gold;text-decoration:underline;cursor:pointer;}
.legal-doc-modal{position:fixed;inset:0;background:#1a1714;z-index:600;display:none;flex-direction:column;}
.legal-doc-modal.open{display:flex;}
</style>
</head>
<body>

<div class="auth-screen" id="loginScreen">
  <h2 style="color:gold">ENDURA</h2>
  <div class="legal-check-wrap">
    <input type="checkbox" id="legalCheckbox">
    <div class="legal-check-label">
      I agree to the <a href="#" data-legal="disclaimer">Disclaimer</a>, 
      <a href="#" data-legal="terms">Terms of Service</a> and 
      <a href="#" data-legal="privacy">Privacy Policy</a>.
    </div>
  </div>
</div>

<div class="legal-doc-modal" id="legalDocModal">
  <button onclick="closeLegalDoc()" style="margin:40px 20px 20px;background:none;border:none;color:gold;font-size:16px;cursor:pointer;">← Back</button>
  <h2 id="legalDocTitle" style="margin:0 20px;color:#e8e0d4;"></h2>
  <p id="legalDocBody" style="margin:20px;color:#999;"></p>
</div>

<script>
var LEGAL_DOCS = {
  disclaimer: { title: "Disclaimer", body: "This is the disclaimer." },
  terms:      { title: "Terms of Service", body: "These are the terms." },
  privacy:    { title: "Privacy Policy", body: "This is the privacy policy." }
};

function openLegalDoc(docKey) {
  var d = LEGAL_DOCS[docKey];
  if (!d) return;
  document.getElementById("legalDocTitle").textContent = d.title;
  document.getElementById("legalDocBody").textContent = d.body;
  document.getElementById("legalDocModal").classList.add("open");
}

function closeLegalDoc() {
  document.getElementById("legalDocModal").classList.remove("open");
}

document.addEventListener("click", function(e) {
  var el = e.target.closest("[data-legal]");
  if (el) {
    e.preventDefault();
    openLegalDoc(el.getAttribute("data-legal"));
  }
});
</script>
</body>
</html>
